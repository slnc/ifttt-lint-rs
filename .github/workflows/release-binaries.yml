name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Resolve tag name
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="$REF_NAME"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Could not resolve a valid release tag (got '$TAG')"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve-tag
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: ${{ matrix.cross }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package artifact (unix)
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG}"
          NAME="ifchange-${VERSION}-${{ matrix.target }}"
          BIN="target/${{ matrix.target }}/release/ifchange"
          cp "$BIN" ifchange
          chmod +x ifchange
          tar -czf "${NAME}.tar.gz" ifchange

      - name: Package artifact (windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG
          $name = "ifchange-$version-${{ matrix.target }}"
          Copy-Item "target/${{ matrix.target }}/release/ifchange.exe" "ifchange.exe"
          Compress-Archive -Path "ifchange.exe" -DestinationPath "$name.zip"

      - name: Generate artifact hash
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT="ifchange-${RELEASE_TAG}-${{ matrix.target }}.${{ matrix.archive_ext }}"
          if command -v sha256sum &>/dev/null; then
            sha256sum "$ARTIFACT" > hash-${{ matrix.target }}.txt
          else
            shasum -a 256 "$ARTIFACT" > hash-${{ matrix.target }}.txt
          fi

      - name: Upload hash
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: hash-${{ matrix.target }}
          path: hash-${{ matrix.target }}.txt
          if-no-files-found: error
          retention-days: 5

      - name: Upload packaged artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: release-${{ matrix.target }}
          path: |
            ifchange-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.target }}.${{ matrix.archive_ext }}
          if-no-files-found: error
          retention-days: 5

  combine-hashes:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      hashes: ${{ steps.combine.outputs.hashes }}
    steps:
      - name: Download hash artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: hash-*
          merge-multiple: true

      - name: Combine hashes
        id: combine
        run: |
          set -euo pipefail
          cat hash-*.txt | base64 -w0 > combined
          echo "hashes=$(cat combined)" >> "$GITHUB_OUTPUT"

  provenance:
    needs: [build, combine-hashes]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: "${{ needs.combine-hashes.outputs.hashes }}"
      upload-assets: true

  publish:
    runs-on: ubuntu-latest
    needs: [resolve-tag, build]
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum ifchange-* > SHA256SUMS

      - name: Sign checksum manifest (keyless)
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          cosign sign-blob --yes \
            --bundle SHA256SUMS.bundle \
            SHA256SUMS

      - name: Sign each binary archive (keyless)
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          for f in ifchange-*.tar.gz ifchange-*.zip; do
            [ -e "$f" ] || continue
            cosign sign-blob --yes \
              --bundle "$f.bundle" \
              "$f"
          done

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: ./dist
          format: spdx-json
          output-file: ./dist/sbom.spdx.json

      - name: Publish release assets
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          generate_release_notes: false
          files: |
            dist/ifchange-*
            dist/SHA256SUMS
            dist/SHA256SUMS.bundle
            dist/sbom.spdx.json

  update-action-tag:
    runs-on: ubuntu-latest
    needs: [resolve-tag, publish]
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Move major version tag
        run: |
          set -euo pipefail
          major="v${RELEASE_TAG#v}"
          major="${major%%.*}"
          git tag -fa "$major" -m "$major → $RELEASE_TAG"
          git push origin "$major" --force

      - name: Move stable tag
        run: |
          set -euo pipefail
          git tag -fa stable -m "stable → $RELEASE_TAG"
          git push origin stable --force

  publish-crate:
    runs-on: ubuntu-latest
    needs: [resolve-tag, publish]
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1.0.3
        id: auth

      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-npm:
    runs-on: ubuntu-latest
    needs: [resolve-tag, build, publish]
    permissions:
      id-token: write
    env:
      RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Set version and generate platform manifests
        run: |
          VERSION="${RELEASE_TAG#v}"
          cd npm
          # Update optionalDependencies versions to match
          node -e "
            const pkg = require('./package.json');
            for (const dep of Object.keys(pkg.optionalDependencies)) {
              pkg.optionalDependencies[dep] = '${VERSION}';
            }
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          cd ..
          node npm/scripts/generate-platforms.mjs

      - name: Place binaries into platform packages
        run: |
          set -euo pipefail

          place_binary() {
            local target="$1" pkg_dir="$2" bin_name="$3" archive_ext="$4"
            local archive="dist/ifchange-${RELEASE_TAG}-${target}.${archive_ext}"
            local tmp
            tmp="$(mktemp -d)"

            if [ "$archive_ext" = "zip" ]; then
              unzip -q "$archive" -d "$tmp"
            else
              tar -xzf "$archive" -C "$tmp"
            fi

            cp "$tmp/$bin_name" "$pkg_dir/$bin_name"
            chmod +x "$pkg_dir/$bin_name"
            rm -rf "$tmp"
          }

          place_binary x86_64-unknown-linux-gnu    npm/platforms/ifchange-linux-x64    ifchange     tar.gz
          place_binary aarch64-unknown-linux-gnu    npm/platforms/ifchange-linux-arm64  ifchange     tar.gz
          place_binary x86_64-apple-darwin          npm/platforms/ifchange-darwin-x64   ifchange     tar.gz
          place_binary aarch64-apple-darwin         npm/platforms/ifchange-darwin-arm64  ifchange     tar.gz
          place_binary x86_64-pc-windows-msvc       npm/platforms/ifchange-win32-x64    ifchange.exe zip

      - name: Copy README into npm packages
        run: |
          cp README.md npm/README.md
          for dir in npm/platforms/*/; do
            cp README.md "$dir/README.md"
          done

      - name: Publish platform packages (idempotent)
        run: |
          set -euo pipefail
          for dir in npm/platforms/*/; do
            pkg="$(basename "$dir")"
            echo "Publishing $pkg..."
            output="$(npm publish "$dir" --access public --provenance 2>&1)" && true
            status=$?
            echo "$output"
            if [ $status -ne 0 ]; then
              if echo "$output" | grep -q "previously published\|cannot publish over"; then
                echo "$pkg already published, skipping"
              elif echo "$output" | grep -q "404 Not Found"; then
                echo "$pkg not found on registry, retrying without --provenance..."
                npm publish "$dir" --access public
              else
                echo "::error::Failed to publish $pkg"
                exit 1
              fi
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for platform packages on registry
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          PACKAGES=(
            "@slnc/ifchange-linux-x64"
            "@slnc/ifchange-linux-arm64"
            "@slnc/ifchange-darwin-x64"
            "@slnc/ifchange-darwin-arm64"
            "@slnc/ifchange-win32-x64"
          )
          pids=()
          for pkg in "${PACKAGES[@]}"; do
            (
              echo "Waiting for $pkg@$VERSION..."
              for i in $(seq 1 60); do
                if npm view "$pkg@$VERSION" version 2>/dev/null | grep -q "$VERSION"; then
                  echo "$pkg@$VERSION is available"
                  exit 0
                fi
                sleep 10
              done
              echo "::error::Timed out waiting for $pkg@$VERSION on registry"
              exit 1
            ) &
            pids+=($!)
          done
          for pid in "${pids[@]}"; do
            wait "$pid" || exit 1
          done

      - name: Publish main package
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          PKG_NAME="$(node -p "require('./npm/package.json').name")"
          if npm view "${PKG_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PKG_NAME}@${VERSION} already published, skipping"
          else
            npm publish ./npm --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    runs-on: ubuntu-latest
    needs: [resolve-tag, publish]
    permissions:
      id-token: write
    env:
      RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'

      - name: Set pypi package version from tag
        run: |
          VERSION="${RELEASE_TAG}"
          VERSION="${VERSION#v}"
          cd pypi
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml

      - name: Copy README into pypi package
        run: cp README.md pypi/README.md

      - name: Build package
        run: |
          pip install build
          cd pypi
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: pypi/dist/

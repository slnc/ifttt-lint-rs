name: release-binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: build-${{ matrix.os }}-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        shell: bash
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package artifact (unix)
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          NAME="lint-ifchange-${VERSION}-${{ matrix.target }}"
          BIN="target/${{ matrix.target }}/release/lint-ifchange"
          cp "$BIN" lint-ifchange
          chmod +x lint-ifchange
          tar -czf "${NAME}.tar.gz" lint-ifchange

      - name: Package artifact (windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $name = "lint-ifchange-$version-${{ matrix.target }}"
          Copy-Item "target/${{ matrix.target }}/release/lint-ifchange.exe" "lint-ifchange.exe"
          Compress-Archive -Path "lint-ifchange.exe" -DestinationPath "$name.zip"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            lint-ifchange-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}

  publish:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum lint-ifchange-* > SHA256SUMS

      - name: Sign checksum manifest (keyless)
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          cosign sign-blob --yes \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem \
            SHA256SUMS

      - name: Sign each binary archive (keyless)
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          for f in lint-ifchange-*.tar.gz lint-ifchange-*.zip; do
            [ -e "$f" ] || continue
            cosign sign-blob --yes \
              --output-signature "$f.sig" \
              --output-certificate "$f.pem" \
              "$f"
          done

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./dist
          format: spdx-json
          output-file: ./dist/sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/lint-ifchange-*'

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/lint-ifchange-*
            dist/SHA256SUMS
            dist/SHA256SUMS.sig
            dist/SHA256SUMS.pem
            dist/sbom.spdx.json

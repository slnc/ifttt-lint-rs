name: Renovate

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Run Renovate
      uses: renovatebot/github-action@v43
      env:
        RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        LOG_LEVEL: info
        RENOVATE_CONFIG: |
          {
            "extends": ["config:recommended"],
            "dependencyDashboard": true,
            "timezone": "UTC",
            "packageRules": [
              {
                "description": "Group all non-security dependency updates weekly with minimum release age",
                "matchPackageNames": ["*"],
                "groupName": "all non-security dependencies",
                "minimumReleaseAge": "4 days",
                "schedule": ["on monday"]
              }
            ],
            "vulnerabilityAlerts": {
              "enabled": true,
              "schedule": ["every day"]
            }
          }

- id: ifchange
  name: ifchange
  description: Lint staged changes with ifchange (requires ifchange in PATH).
  entry: examples/hooks/pre-commit.ifchange.sh
  language: system
  pass_filenames: false
  always_run: true
- id: ifchange-pypi
  name: ifchange (PyPI)
  description: Lint staged changes with ifchange installed from this repo's PyPI wrapper.
  entry: examples/hooks/pre-commit.ifchange.sh
  language: python
  additional_dependencies:
    - ./pypi
  pass_filenames: false
  always_run: true
